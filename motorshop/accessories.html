<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessories - Motor Shop</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #2c5364);
        }

        header {
            background: #000;
            color: #00ffcc;
            padding: 15px;
            text-align: center;
        }

        nav {
            background: #111;
            padding: 12px;
            text-align: center;
        }

        nav a {
            color: #fff;
            margin: 0 12px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #00ffcc;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #fff;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: #fff;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        .card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
        }

        .card h3 {
            margin: 10px 0;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        button {
            background: orange;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: darkorange;
        }

        footer {
            background: #000;
            color: #00ffcc;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>Motor Shop Accessories</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="services.html">Motor Services</a>
    <a href="parts.html">Parts</a>
    <a href="accessories.html">Accessories</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">
    <h1>Available Accessories</h1>

    <div class="grid">

        <div class="card">
            <img src="Motorcycle Helmet.jpg" alt="Helmet">
            <h3>Motorcycle Helmet</h3>
            <p class="price">$50</p>
            <button>Buy</button>
        </div>

        <div class="card">
            <img src="Riding Gloves.jpg" alt="Gloves">
            <h3>Riding Gloves</h3>
            <p class="price">$20</p>
            <button>Buy</button>
        </div>

        <div class="card">
            <img src="Phone Holder.png" alt="Phone Holder">
            <h3>Phone Holder</h3>
            <p class="price">$15</p>
            <button>Buy</button>
        </div>

        <div class="card">
            <img src="LED Lights.jpg" alt="LED Lights">
            <h3>LED Lights</h3>
            <p class="price">$25</p>
            <button>Buy</button>
        </div>

    </div>
</div>

<footer>
    <p>&copy; 2026 Motor Shop</p>
</footer>

</body>
</html>
