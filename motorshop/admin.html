<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Motor Shop</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
}

/* Sidebar */
.sidebar {
    width: 230px;
    height: 100vh;
    background: #111;
    position: fixed;
    padding-top: 20px;
}

.sidebar h2 {
    color: #00ffcc;
    text-align: center;
}

.sidebar a {
    display: block;
    color: white;
    padding: 15px;
    text-decoration: none;
}

.sidebar a:hover {
    background: #00ffcc;
    color: black;
}

/* Main content */
.main {
    margin-left: 230px;
    padding: 20px;
}

.header {
    background: black;
    color: #00ffcc;
    padding: 15px;
    text-align: center;
    border-radius: 8px;
}

.card {
    background: white;
    padding: 20px;
    margin-top: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

button {
    padding: 10px;
    border: none;
    background: #00ffcc;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: orange;
}
</style>

</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>ADMIN</h2>
    <a href="#dashboard">📊 Dashboard</a>
    <a href="#products">🧩 Product Settings</a>
    <a href="index.html">🚪 Logout</a>
</div>

<!-- MAIN -->
<div class="main">

    <div class="header">
        <h1>Motor Shop Admin Panel</h1>
    </div>

    <!-- DASHBOARD -->
    <div class="card" id="dashboard">
        <h2>📊 Dashboard</h2>
        <p>Welcome Admin! Manage your Motor Shop here.</p>

        <p><b>Total Products:</b> 10</p>
        <p><b>Total Orders:</b> 5</p>
        <p><b>Users:</b> 20</p>
    </div>

    <!-- PRODUCT SETTINGS -->
    <div class="card" id="products">
        <h2>🧩 Product Settings</h2>

        <p>Add or manage your motor products here.</p>

        <input type="text" placeholder="Product Name" style="width:95%;padding:10px;margin:5px;">
        <input type="text" placeholder="Price" style="width:95%;padding:10px;margin:5px;">
        <button>Add Product</button>
    </div>

</div>

</body>
</html>
