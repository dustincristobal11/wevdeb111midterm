<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Music Playlist</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1db954, #191414);
            color: white;
            text-align: center;
        }
        header {
            padding: 20px;
        }
        h1 {
            margin: 0;
        }
        .playlist {
            max-width: 600px;
            margin: auto;
            padding: 20px;
        }
        .song {
            background: rgba(255,255,255,0.1);
            margin: 15px 0;
            padding: 15px;
            border-radius: 10px;
        }
        .song h3 {
            margin: 5px 0;
        }
        audio {
            width: 100%;
            margin-top: 10px;
        }
        footer {
            margin-top: 20px;
            padding: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<header>
    <h1>🎵 My Playlist</h1>
    <p>Enjoy your favorite songs</p>
</header>

<div class="playlist">

    <div class="song">
        <h3>Song Title 1</h3>
        <p>Artist Name</p>
        <audio controls>
            <source src="song1.mp3" type="audio/mpeg">
            Your browser does not support audio.
        </audio>
    </div>

    <div class="song">
        <h3>Song Title 2</h3>
        <p>Artist Name</p>
        <audio controls>
            <source src="song2.mp3" type="audio/mpeg">
            Your browser does not support audio.
        </audio>
    </div>

    <div class="song">
        <h3>Song Title 3</h3>
        <p>Artist Name</p>
        <audio controls>
            <source src="song3.mp3" type="audio/mpeg">
            Your browser does not support audio.
        </audio>
    </div>

</div>

<footer>
    <p>&copy; 2026 My Music Playlist</p>
</footer>

</body>
</html>
