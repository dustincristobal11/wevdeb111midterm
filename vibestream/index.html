<!DOCTYPE html>
<html>
<head>
    <title>boss amo  - Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #b7c96f, #e6e6e6);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            width: 350px;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .icon {
            font-size: 50px;
        }

        h1 {
            margin: 10px 0;
            font-weight: bold;
        }

        h1 span {
            color: #2a7de1;
        }

        .subtitle {
            color: gray;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(to right,#ff8800,#00eeff);
            color: black;
            font-size: 16px;
            cursor: pointer;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .link {
            margin-top: 20px;
            font-size: 14px;
            color: #2a7de1;
            cursor: pointer;
        }

        .small-text {
            margin-top: 15px;
            font-size: 13px;
            color: gray;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="icon">🎧</div>

        <h1>boss amo<span>Music</span></h1>
        <p class="subtitle">Log in to your rhythm</p>

        <input type="email" placeholder="Email Address">
        <input type="password" placeholder="Password">

        <button class="btn">Sign In</button>

        <div class="small-text">Forgot Password?</div>
        <div class="link">New here? Join the Beat</div>
    </div>

</body>
</html>
