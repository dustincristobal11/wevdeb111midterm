<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velvet Crust</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #7300ff, #ff0000);
}

/* Header */
header {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: rgba(255,255,255,0.35);
  backdrop-filter: blur(10px);
}

nav a {
  margin: 0 10px;
  text-decoration: none;
  color: #7300ff;
  font-weight: bold;
  cursor: pointer;
}

/* Pages */
.container {
  display: none;
  padding: 20px;
}

.active {
  display: block;
}

/* Card */
.card {
  background: rgba(255,255,255,0.3);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  padding: 20px;
  max-width: 600px;
  margin: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}

/* Products */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

.product {
  background: rgba(255,255,255,0.35);
  padding: 15px;
  border-radius: 15px;
  text-align: center;
  transition: 0.2s;
}

.product:hover {
  transform: translateY(-5px);
}

button {
  background: #f5e6cc;
  border: none;
  padding: 10px 15px;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 10px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 10px;
  border: none;
}
</style>
</head>

<body>

<header>
  <h2>Velvet Crust 🍰</h2>
  <nav>
    <a onclick="showPage('home')">Home</a>
    <a onclick="showPage('about')">About</a>
    <a onclick="showPage('cart')">Cart</a>
    <a onclick="showPage('login')">Login</a>
  </nav>
</header>

<!-- HOME -->
<div id="home" class="container active">
  <div class="card">
    <h2>Welcome to Velvet Crust</h2>
    <p>Custom cakes crafted with care and elegance 💕</p>
  </div>

  <div class="products">

    <div class="product">
      <h3>Chocolate Cake</h3>
      <p>₱399</p>
      <button onclick="addToCart('Chocolate Cake', 399)">Add to Cart</button>
    </div>

    <div class="product">
      <h3>Red Velvet</h3>
      <p>₱650</p>
      <button onclick="addToCart('Red Velvet', 699)">Add to Cart</button>
    </div>

    <div class="product">
      <h3>Strawberry Cake</h3>
      <p>₱599</p>
      <button onclick="addToCart('Strawberry Cake', 599)">Add to Cart</button>
    </div>

  </div>
</div>

<!-- ABOUT -->
<div id="about" class="container">
  <div class="card">
    <h2>About Us</h2>
    <p>We create beautiful custom cakes for all occasions 🎉</p>
  </div>
</div>

<!-- CART -->
<div id="cart" class="container">
  <div class="card">
    <h2>Your Cart 🛒</h2>
    <ul id="cartList"></ul>
  </div>
</div>

<!-- LOGIN -->
<div id="login" class="container">
  <div class="card">
    <h2>Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="msg"></p>
  </div>
</div>

<script>
let cart = [];

/* PAGE SWITCH */
function showPage(page) {
  document.querySelectorAll(".container").forEach(el => el.classList.remove("active"));
  document.getElementById(page).classList.add("active");
}

/* ADD TO CART */
function addToCart(name, price) {
  cart.push({ name, price });
  alert(name + " added to cart!");
  updateCart();
}

/* UPDATE CART */
function updateCart() {
  const list = document.getElementById("cartList");
  list.innerHTML = "";

  let total = 0;

  cart.forEach(item => {
    const li = document.createElement("li");
    li.textContent = `${item.name} - ₱${item.price}`;
    list.appendChild(li);
    total += item.price;
  });

  const totalItem = document.createElement("li");
  totalItem.innerHTML = `<strong>Total: ₱${total}</strong>`;
  list.appendChild(totalItem);
}

/* LOGIN */
function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if (user === "admin" && pass === "1234") {
    document.getElementById("msg").textContent = "✅ Login Successful!";
  } else {
    document.getElementById("msg").textContent = "❌ Invalid credentials";
  }
}
</script>

</body>
</html>
